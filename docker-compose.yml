services:
  neo4j:
    image: neo4j:5.18.0
    container_name: mediverse_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol (used by the Python driver)
    environment:
      - NEO4J_AUTH=neo4j/Mediverse
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Mediverse", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  loader:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY toy_loading_patient_csv.py .
        COPY mapping.json .
        CMD ["python", "toy_loading_patient_csv.py"]
    container_name: mediverse_loader
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=Mediverse
      - CSV_FILE=/data/patient.csv
      - MAPPING_FILE=mapping.json
    volumes:
      - ./neo4j/import:/data        # place patient.csv here before running
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
